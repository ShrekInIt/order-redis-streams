version: "3.9"

services:
  redis:
    image: redis:7.4-alpine
    container_name: redis-streams-orders
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  order-service:
    build:
      context: ./orders
      dockerfile: Dockerfile
    container_name: order-service
    depends_on:
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

volumes:
  redis-data: